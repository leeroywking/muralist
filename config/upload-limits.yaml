# Client-side sanitization defaults and server-side pass-through caps.
# The client downsamples and re-encodes to these targets before upload;
# the server validates magic bytes, Content-Type, and base64 length
# against the caps below but never decodes the image.
#
# Sanitized image: reduced working image persisted with the project,
# used to regenerate the maquette PDF's flattened preview on re-open.
# Thumbnail: small dashboard-tile image.
#
# Mongo BSON document cap is 16 MB; our caps are three orders of magnitude
# below that. Size caps are UX-driven (load speed, per-user storage cost),
# not DB-driven.

version: 1
sanitizedImage:
  maxBytes: 409600         # ~400 KB — ~55% margin over the pathological
                           # 640px q=0.8 worst case (~256 KB). Leaves 40×
                           # headroom under Mongo's 16 MB doc cap.
  longEdge: 640            # px
  jpegQuality: 0.8
thumbnail:
  maxBytes: 65536          # ~64 KB — real rectangular art was tripping the
                           # 24 KB cap, so the ~22 KB theoretical ceiling
                           # was optimistic. 64 KB gives ~3× that with room
                           # for whatever the browser encoder produces.
  longEdge: 192            # px
  jpegQuality: 0.8
# The sanitizer always re-encodes to JPEG before upload, so the server never
# sees PNG even though the client extension allowlist accepts .png.
contentTypeAllowlist:
  - image/jpeg
  - image/webp
