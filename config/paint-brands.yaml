# Global default paint-brand assumptions.
# These values are intended to be rough planning inputs for the prototype.
# Later versions should allow user-scoped overrides in the database.

version: 1
units:
  coverage: sqft_per_gallon

brands:
  - id: sherwin_williams
    display_name: Sherwin-Williams
    retailer: Sherwin-Williams
    coverage:
      min: 350
      default: 375
      max: 400
    default_coats: 2
    confidence: rough_official_range
    notes: Average planning range based on official coverage guidance.
    sources:
      - https://images.sherwin-williams.com/content_images/sw-pdf-painter-skills-training-class-presentation-presenter-notes.pdf

  - id: valspar
    display_name: Valspar
    retailer: Lowe's
    coverage:
      min: 400
      default: 400
      max: 400
    default_coats: 2
    confidence: rough_official_range
    notes: Planning baseline based on Lowe's listed maximum coverage area for Valspar interior paint products.
    sources:
      - https://www.lowes.com/pd/Valspar-Reserve-Flat-Latex-Interior-Paint-and-Primer-in-One-Actual-Net-Contents-116-fl-oz/50146418
      - https://www.lowes.com/pd/Valspar-Signature-Base-B-Satin-Tintable-Interior-Paint-Actual-Net-Contents-118-fl-oz/1000381169

  - id: behr
    display_name: Behr
    retailer: Home Depot
    coverage:
      min: 250
      default: 325
      max: 400
    default_coats: 2
    confidence: rough_official_range
    notes: Wide planning range based on official technical data sheet coverage guidance.
    sources:
      - https://www.homedepot.com/catalog/pdfImages/d4/d4e8e494-8bea-47d2-bdd0-de306c300c10.pdf
