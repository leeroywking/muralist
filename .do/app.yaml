# DigitalOcean App Platform spec for the Muralist API.
#
# Create / update via:
#   doctl apps create --spec .do/app.yaml
#   doctl apps update <app-id> --spec .do/app.yaml
#
# Secrets (MONGO_URI, BETTER_AUTH_SECRET, OAuth client/secret pairs) are NOT
# in this file — they're set on the app after creation via:
#   doctl apps config set <app-id> MONGO_URI="..." --encrypted
# or through the DO console. Only non-secret defaults live here.

name: muralist-api
region: nyc
# Two domains, each bound to a specific component via `ingress.rules` below:
#   - api.muraliste.com  -> `api` service (Fastify)
#   - muraliste.com      -> `web` static site (Next.js export)
domains:
  # `zone:` is intentionally omitted so DO treats these as externally-managed.
  # Our zone lives on Cloudflare (nameservers clyde.ns / sierra.ns), and
  # adding `zone:` makes DO try to verify its own nameservers are
  # authoritative, which fails with DomainUnexpectedNameserver.
  - domain: muraliste.com
    type: PRIMARY
  - domain: api.muraliste.com
    type: ALIAS
ingress:
  rules:
    - match:
        authority:
          exact: api.muraliste.com
        path:
          prefix: /
      component:
        name: api
    - match:
        authority:
          exact: muraliste.com
        path:
          prefix: /
      component:
        name: web
services:
  - name: api
    github:
      repo: leeroywking/muralist
      branch: feat/persistence-auth-backend
      deploy_on_push: true
    source_dir: /
    # Explicitly --include=dev so TypeScript + tsx (devDeps) are installed
    # for the workspace builds. DO App Platform's buildpack defaults to
    # `npm ci --production` regardless of the declared NODE_ENV scope.
    build_command: npm ci --include=dev && npm run build --workspace @muralist/config && npm run build --workspace @muralist/core && npm run build --workspace @muralist/api
    run_command: npm run start --workspace @muralist/api
    environment_slug: node-js
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 4000
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        # RUN_TIME only — if we set this at build time, `npm ci` skips
        # devDependencies (typescript, tsx) and the workspace builds fail
        # with `sh: 1: tsc: not found`.
        scope: RUN_TIME
        value: production
      - key: MONGO_DB_NAME
        scope: RUN_TIME
        value: muralist
      - key: PORT
        scope: RUN_TIME
        value: "4000"
      # Secrets below are placeholders — set real values via:
      #   doctl apps update <app-id> --spec .do/app.yaml  (WON'T set secrets)
      #   doctl apps config set <app-id> KEY=VALUE --encrypted
      - key: MONGO_URI
        scope: RUN_TIME
        type: SECRET
      - key: BETTER_AUTH_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: APP_BASE_URL
        scope: RUN_AND_BUILD_TIME
        # Canonical API URL — Better Auth uses this to mint callback URLs
        # (`<APP_BASE_URL>/api/auth/callback/<provider>`), which is where
        # Google / Apple / etc will redirect back to. Must be the API
        # subdomain, not the web origin. Change if the custom domain changes.
        value: https://api.muraliste.com
      - key: WEB_ORIGIN
        scope: RUN_TIME
        # Origin of the Next.js client. Added to CORS + Better Auth
        # trustedOrigins so cross-subdomain fetch calls from the web app are
        # accepted. Without this the browser blocks every API call from
        # muraliste.com → api.muraliste.com with a CORS error.
        value: https://muraliste.com
      # OAuth provider credentials — wire when ready (see task #17).
      - key: GOOGLE_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: APPLE_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: APPLE_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: FACEBOOK_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: FACEBOOK_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ADOBE_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: ADOBE_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET

static_sites:
  - name: web
    github:
      repo: leeroywking/muralist
      branch: feat/persistence-auth-backend
      deploy_on_push: true
    source_dir: /
    # The web workspace depends on @muralist/config + @muralist/core; both
    # must be built before `next build`. Next export drops a static bundle
    # into apps/web/out (output_dir below).
    build_command: npm ci --include=dev && npm run build --workspace @muralist/config && npm run build --workspace @muralist/core && npm run build --workspace @muralist/web
    output_dir: /apps/web/out
    index_document: index.html
    # Next's static export emits 404.html; use it so unknown routes get the
    # right status while still letting the SPA's client router take over on
    # known deep-links (Next already generates per-route HTML files).
    catchall_document: 404.html
    environment_slug: node-js
    envs:
      - key: NEXT_PUBLIC_API_BASE_URL
        # Inlined into the client bundle at `next build` time, so the UI
        # talks to the live API origin. Cookie auth requires same-site or
        # CORS-with-credentials; api + web sharing the muraliste.com apex
        # keeps cookies first-party.
        scope: BUILD_TIME
        value: https://api.muraliste.com

# Notes:
# - Size basic-xxs is $5/mo fixed tier: 1 vCPU shared / 512 MiB RAM, single
#   instance, 50 GiB outbound bandwidth included.
# - Region nyc matches the Mongo cluster region (nyc3) to keep latency low
#   and avoid cross-region egress charges.
# - deploy_on_push: true auto-builds on every push to feat/persistence-auth-backend.
#   Change to `branch: main` after the PR merges.
# - The Mongo cluster's trusted sources list needs this app added once the
#   app exists (`doctl databases firewalls append`).
