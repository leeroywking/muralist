name: Web Preview

on:
  push:
    branches:
      - "feat/**"

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute preview slug
        id: slug
        run: |
          # Turn "feat/estimator-accuracy-bundle" into "estimator-accuracy-bundle"
          # so each feature branch lands at /muralist/previews/<slug>/.
          raw="${GITHUB_REF_NAME#feat/}"
          slug="${raw//\//-}"
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"
          echo "base_path=/muralist/previews/${slug}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build workspace dependencies
        run: |
          npm run build --workspace @muralist/config
          npm run build --workspace @muralist/core

      - name: Build web export for preview
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_BASE_PATH: ${{ steps.slug.outputs.base_path }}
        run: npm run build --workspace @muralist/web

      - name: Add .nojekyll marker
        run: touch apps/web/out/.nojekyll

      - name: Publish preview to gh-pages
        env:
          PREVIEW_SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin gh-pages; then
            git fetch origin gh-pages
            git worktree add /tmp/gh-pages origin/gh-pages
          else
            git worktree add -b gh-pages /tmp/gh-pages
          fi
          mkdir -p "/tmp/gh-pages/previews/${PREVIEW_SLUG}"
          rsync -a --delete --exclude .git "apps/web/out/" "/tmp/gh-pages/previews/${PREVIEW_SLUG}/"
          touch /tmp/gh-pages/.nojekyll
          cd /tmp/gh-pages
          git add .
          if git diff --cached --quiet; then
            echo "No preview changes to publish."
            exit 0
          fi
          git commit -m "Deploy preview ${GITHUB_REF_NAME} from ${GITHUB_SHA}"
          git push origin HEAD:gh-pages
