name: Web Preview

on:
  push:
    branches:
      - feat/color-mix-planner

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build web export for preview
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_BASE_PATH: "/muralist"
        run: npm run build --workspace @muralist/web

      - name: Add .nojekyll marker
        run: touch apps/web/out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

      - name: Deploy preview to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
