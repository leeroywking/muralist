name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_BASE_PATH: "/muralist"
        run: npm run build

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist
          if-no-files-found: error

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-static
          path: apps/web/out
          if-no-files-found: error

      - name: Upload Mobile artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-export
          path: apps/mobile/dist
          if-no-files-found: error

  publish-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build workspace dependencies
        run: |
          npm run build --workspace @muralist/config
          npm run build --workspace @muralist/core

      - name: Build web export for Pages
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_BASE_PATH: "/muralist"
        run: npm run build --workspace @muralist/web

      - name: Add .nojekyll marker
        run: touch apps/web/out/.nojekyll

      - name: Publish root site to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin gh-pages; then
            git fetch origin gh-pages
            git worktree add /tmp/gh-pages origin/gh-pages
          else
            git worktree add -b gh-pages /tmp/gh-pages
          fi
          mkdir -p /tmp/gh-pages/previews
          # --checksum: content-compare, not size+mtime. Webpack chunk filenames
          # are constant-length so index.html can differ only in hash characters,
          # leaving size identical and rsync silently skipping an updated file.
          rsync -a --delete --checksum --exclude .git --exclude previews apps/web/out/ /tmp/gh-pages/
          touch /tmp/gh-pages/.nojekyll
          cd /tmp/gh-pages
          git add .
          if git diff --cached --quiet; then
            echo "No Pages changes to publish."
            exit 0
          fi
          git commit -m "Deploy main site from ${GITHUB_SHA}"
          git push origin HEAD:gh-pages
