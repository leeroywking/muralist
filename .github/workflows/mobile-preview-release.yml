name: Mobile Preview Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  android-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android project
        run: npm run prebuild:android --workspace @muralist/mobile

      - name: Build Android release APK
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Android preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-preview-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  ios-simulator-preview:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS project
        run: npm run prebuild:ios --workspace @muralist/mobile

      - name: Build iOS simulator app
        working-directory: apps/mobile/ios
        run: |
          pod install
          xcodebuild -workspace Muralist.xcworkspace -scheme Muralist -showdestinations
          xcodebuild \
            -workspace Muralist.xcworkspace \
            -scheme Muralist \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Package iOS simulator app
        working-directory: apps/mobile/ios/build/Build/Products/Release-iphonesimulator
        run: ditto -c -k --sequesterRsrc --keepParent Muralist.app muralist-ios-simulator.zip

      - name: Upload iOS simulator preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-preview
          path: apps/mobile/ios/build/Build/Products/Release-iphonesimulator/muralist-ios-simulator.zip
          if-no-files-found: error

  publish-android-preview-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - android-preview
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-preview-apk
          path: release-assets/android

      - name: Publish Android prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-preview-${{ github.run_number }}
          name: Android Preview ${{ github.run_number }}
          prerelease: true
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/android/app-release.apk

  publish-ios-simulator-preview-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - ios-simulator-preview
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download iOS simulator artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-simulator-preview
          path: release-assets/ios

      - name: Publish iOS simulator prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-simulator-preview-${{ github.run_number }}
          name: iOS Simulator Preview ${{ github.run_number }}
          prerelease: true
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/ios/muralist-ios-simulator.zip
